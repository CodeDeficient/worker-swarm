services:
  wt-1:
    build:
      context: .
      dockerfile: Dockerfile.opencode
    container_name: myproject-agent-wt-1
    ports:
      - '8081:8080'
    volumes:
      - ./myproject-wt-1:/app
      - ~/.config/opencode/skills:/home/node/.config/opencode/skills:cached
      - ~/.claude/skills:/home/node/.claude/skills:cached
      - ~/.agents/skills:/home/node/.agents/skills:cached
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - WORKER_ID=1
      # Auto-approve all tools for headless worker operations
      - OPENCODE_CONFIG_CONTENT={"permission":{"read":{"*":"allow"},"write":{"*":"allow"},"bash":{"*":"allow"},"edit":{"*":"allow"},"external_directory":{"*":"allow"},"glob":{"*":"allow"},"grep":{"*":"allow"},"list":{"*":"allow"}}}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health']
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: '4.0'
        reservations:
          memory: 8G
          cpus: '2.0'
    shm_size: 8gb
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

